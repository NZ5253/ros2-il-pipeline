# Reference training configuration for ACT on a Franka Panda pick-and-place dataset.
# Tunable from the FastAPI training endpoint or via CLI:
#   il-train --dataset /data/lerobot_datasets/panda_pickplace_v1 \
#            --policy act --output runs/panda_pickplace_act \
#            --epochs 2000 --chunk-size 50

policy_type: "act"

model:
  state_dim: 21        # 7 joint pos + 7 joint vel + 7 EE pose (xyz + quat)
  action_dim: 7
  chunk_size: 50
  kl_weight: 10.0
  hidden_dim: 512
  num_layers: 4
  num_heads: 8

training:
  epochs: 2000
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-4
  validation_split: 0.1
  checkpoint_every_steps: 5000
  seed: 42

device: "cuda:0"
