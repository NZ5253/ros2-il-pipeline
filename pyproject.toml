# Project-level Python config.
#
# The il_pipeline package itself is a ROS 2 ament_python package built via colcon
# (see il_pipeline/package.xml + il_pipeline/setup.py). This pyproject.toml is
# only for repo-wide tooling: pytest, ruff, mypy. Treat it as a dev convenience,
# not a pip-installable package definition.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"
pythonpath = ["il_pipeline"]
