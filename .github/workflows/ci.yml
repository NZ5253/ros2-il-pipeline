name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyarrow torch pytest ruff
          pip install -e il_pipeline/

      - name: Lint
        run: ruff check il_pipeline/il_pipeline/ tests/ scripts/

      - name: Run tests
        run: pytest tests/ -v

      - name: Run synthetic end-to-end demo
        run: python scripts/synthetic_demo.py --clean --n-episodes 10 --epochs 20
